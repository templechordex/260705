<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROUND SOUND</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
    }
  }
  </script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #02040f; }
    canvas { display: block; }
    .round-ui {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: Arial, Helvetica, sans-serif;
    }
    .round-controls {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 16px;
      pointer-events: auto;
    }
    .round-button {
      border: 1px solid rgba(102, 221, 255, 0.82);
      border-radius: 0;
      background: linear-gradient(180deg, rgba(8, 18, 32, 0.62), rgba(3, 10, 20, 0.74));
      box-shadow: 0 0 22px rgba(102, 221, 255, 0.38), inset 0 0 18px rgba(255, 102, 204, 0.10);
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 0 14px rgba(102, 221, 255, 0.92);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, opacity 260ms ease, filter 260ms ease;
    }
    .round-button:hover,
    .round-button:focus-visible {
      border-color: rgba(255, 102, 204, 0.95);
      box-shadow: 0 0 30px rgba(255, 102, 204, 0.42), inset 0 0 18px rgba(102, 221, 255, 0.18);
      transform: scale(1.03);
      outline: none;
    }
    .round-button.main {
      width: min(42vw, 250px);
      height: min(18vw, 92px);
      padding: 0;
      font-size: clamp(24px, 5vw, 48px);
      line-height: 1;
    }
    .round-button.stop {
      width: min(30vw, 156px);
      height: min(11vw, 52px);
      padding: 0;
      font-size: clamp(14px, 2.7vw, 24px);
      line-height: 1;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(-10px) scale(0.92);
      pointer-events: none;
    }
    .round-button.stop.is-visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .round-button.stop.is-visible:hover,
    .round-button.stop.is-visible:focus-visible { transform: translateY(0) scale(1.03); }

    .round-loading {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(18, 56, 72, 0.96), rgba(0, 0, 0, 0.98) 62%);
      color: #eaffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.18em;
    }
    .round-loading__panel { width: min(72vw, 360px); text-align: center; }
    .round-loading__title { margin-bottom: 18px; font-size: 14px; opacity: 0.82; }
    .round-loading__track {
      height: 3px;
      width: 100%;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 24px rgba(102, 221, 255, 0.28);
    }
    .round-loading__bar {
      height: 100%;
      width: 28%;
      border-radius: inherit;
      background: linear-gradient(90deg, #66ddff, #ff66cc);
      animation: round-loading-pulse 1.1s ease-in-out infinite alternate;
    }
    .round-loading__count {
      margin-top: 14px;
      color: rgba(234, 255, 255, 0.62);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    @keyframes round-loading-pulse {
      from { transform: translateX(-45%); opacity: 0.58; }
      to { transform: translateX(255%); opacity: 1; }
    }
    .round-hint {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 4;
      transform: translateX(-50%);
      margin: 0;
      color: rgba(159, 238, 255, 0.68);
      font: 13px/1.5 Arial, Helvetica, sans-serif;
      letter-spacing: 0.08em;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="round-initial-loading" class="round-loading" role="status" aria-live="polite">
    <div class="round-loading__panel">
      <div class="round-loading__title">LOADING ROUND</div>
      <div class="round-loading__track"><div class="round-loading__bar"></div></div>
      <div class="round-loading__count">preparing scene...</div>
    </div>
  </div>
  <div class="round-ui" aria-label="ROUND sound controls">
    <div class="round-controls">
      <button id="round-main-button" class="round-button main" type="button">SOUND</button>
      <button id="round-stop-button" class="round-button stop" type="button" aria-hidden="true" tabindex="-1">STOP</button>
    </div>
  </div>
  <p class="round-hint">CLICK ROUND OBJECTS TO SWITCH SOUND</p>
  <script type="module" src="round.js"></script>
</body>
</html>
